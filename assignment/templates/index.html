<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <title>ESP32 Temperature Monitor</title>
</head>

<body>

    <h2>ESP32 Temperature Monitor</h2>

    <div class="card">Temperature: <span id="temp" class="temp">--</span> °C</div>

    <div class="card">LED pattern: <span id="pattern">--</span></div>

    <form action="/set_led" method="POST">
        <input class="card" type="submit" name="submit_button" value="Wave">

        <input class="card" type="submit" name="submit_button" value="Curtain">

        <input class="card" type="submit" name="submit_button" value="Checker">

        <input class="card" type="submit" name="submit_button" value="Temperature">
    </form>
    
    <script>
        setInterval(() => {
            fetch('/get_data')
                .then(response => response.json())
                .then(data => {
                document.getElementById("temp").innerText = data.temperature;
                document.getElementById("pattern").innerText = data.led;
                });
            }, 1000);
    </script>

</body>
